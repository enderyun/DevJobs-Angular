<main>

  <app-search-form-section 
    [initialText]="textToFilter()"
    [initialFilters]="filters()"
    (onSearch)="handleSearch($event)"
    (onTextFilter)="handleTextFilter($event)"
  />

  <section>
    @if (jobsResource.isLoading()) {
    <div className="spinner-container">
      <svg className="spinner" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
        <path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0" />
        <path d="M9 9h.01" />
        <path d="M15 9h.01" />
        <path d="M13 15a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" />
      </svg>
    </div>
    }
    @else {
    <app-job-listings [jobs]="jobs()" />
    }

    <app-pagination />

  </section>
</main>
